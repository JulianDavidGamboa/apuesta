<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kuazimides{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .card { border: none; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .table thead th { background: #212529; color: #fff; border-color: #343a40; }
    .badge-pct { font-size: .75rem; }
    .stat-box { background: #fff; border-radius: 8px; padding: 1rem 1.25rem;
                box-shadow: 0 1px 4px rgba(0,0,0,.07); text-align: center; }
    .stat-box .value { font-size: 1.35rem; font-weight: 700; }
    .profit-positive { color: #198754; }
    .profit-negative { color: #dc3545; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='kuaza.png') }}" alt="logo"
           style="width:32px;height:32px;object-fit:cover;border-radius:50%;">
      Kuazimides
    </a>
    <div class="d-flex gap-2">
      <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline-light">
        <i class="bi bi-clock-history me-1"></i>Historial
      </a>
      <a href="{{ url_for('nueva_ronda') }}" class="btn btn-sm btn-success">
        <i class="bi bi-plus-lg me-1"></i>Nueva ronda
      </a>
      <a href="{{ url_for('resumen') }}" class="btn btn-sm btn-outline-info">
        <i class="bi bi-bar-chart me-1"></i>Resumen
      </a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
