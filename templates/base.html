<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kuazimides{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none; }
    .profit-pos { color: #10b981; }
    .profit-neg { color: #f43f5e; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- Navbar -->
<nav class="bg-slate-900 shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="{{ url_for('index') }}" class="flex items-center gap-3">
        <img id="logo-img" src="{{ url_for('static', filename='kuaza.png') }}?v={{ range(1000,9999) | random }}" alt="logo"
             class="w-9 h-9 rounded-full object-cover ring-2 ring-indigo-400 cursor-zoom-in hover:ring-indigo-300 transition">
        <span class="text-white font-bold text-lg tracking-wide">Kuazimides</span>
      </a>

      <!-- Nav links -->
      {% set ep = request.endpoint %}
      <div class="hidden sm:flex items-center gap-2">
        <a href="{{ url_for('index') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition
                  {{ 'bg-slate-700 text-white font-medium' if ep == 'index' else 'text-slate-300 hover:text-white hover:bg-slate-700' }}">
          <i class="bi bi-clock-history"></i> Historial
        </a>
        <a href="{{ url_for('resumen') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition
                  {{ 'bg-slate-700 text-white font-medium' if ep == 'resumen' else 'text-slate-300 hover:text-white hover:bg-slate-700' }}">
          <i class="bi bi-bar-chart"></i> Resumen
        </a>
        <a href="{{ url_for('estadisticas') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition
                  {{ 'bg-slate-700 text-white font-medium' if ep == 'estadisticas' else 'text-slate-300 hover:text-white hover:bg-slate-700' }}">
          <i class="bi bi-graph-up-arrow"></i> Estadísticas
        </a>
        <a href="{{ url_for('calendario') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition
                  {{ 'bg-slate-700 text-white font-medium' if ep == 'calendario' else 'text-slate-300 hover:text-white hover:bg-slate-700' }}">
          <i class="bi bi-calendar3"></i> Calendario
        </a>
        <a href="{{ url_for('personas') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition
                  {{ 'bg-slate-700 text-white font-medium' if ep == 'personas' else 'text-slate-300 hover:text-white hover:bg-slate-700' }}">
          <i class="bi bi-people"></i> Personas
        </a>
        <a href="{{ url_for('nueva_ronda') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition font-medium
                  {{ 'bg-indigo-400 text-white' if ep == 'nueva_ronda' else 'bg-indigo-600 text-white hover:bg-indigo-500' }}">
          <i class="bi bi-plus-lg"></i> Nueva ronda
        </a>
        <a href="https://docs.google.com/document/d/1uYGqfkzYCspucwf3HZQSmRgHaCZkfYv8CQwTBT4mBfU/edit?tab=t.0" target="_blank"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-slate-700 transition">
          <i class="bi bi-file-earmark-text"></i> Docs
        </a>
      </div>

      <!-- Mobile menu button -->
      <button id="menu-btn" class="sm:hidden text-slate-300 hover:text-white p-2">
        <i class="bi bi-list text-xl"></i>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden sm:hidden border-t border-slate-700">
    <div class="px-4 py-3 flex flex-col gap-1">
      <a href="{{ url_for('index') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition
         {{ 'bg-slate-700 text-white font-medium' if ep == 'index' else 'text-slate-300 hover:bg-slate-700 hover:text-white' }}">
        <i class="bi bi-clock-history"></i> Historial
      </a>
      <a href="{{ url_for('resumen') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition
         {{ 'bg-slate-700 text-white font-medium' if ep == 'resumen' else 'text-slate-300 hover:bg-slate-700 hover:text-white' }}">
        <i class="bi bi-bar-chart"></i> Resumen
      </a>
      <a href="{{ url_for('estadisticas') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition
         {{ 'bg-slate-700 text-white font-medium' if ep == 'estadisticas' else 'text-slate-300 hover:bg-slate-700 hover:text-white' }}">
        <i class="bi bi-graph-up-arrow"></i> Estadísticas
      </a>
      <a href="{{ url_for('calendario') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition
         {{ 'bg-slate-700 text-white font-medium' if ep == 'calendario' else 'text-slate-300 hover:bg-slate-700 hover:text-white' }}">
        <i class="bi bi-calendar3"></i> Calendario
      </a>
      <a href="{{ url_for('personas') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm transition
         {{ 'bg-slate-700 text-white font-medium' if ep == 'personas' else 'text-slate-300 hover:bg-slate-700 hover:text-white' }}">
        <i class="bi bi-people"></i> Personas
      </a>
      <a href="{{ url_for('nueva_ronda') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition
         {{ 'bg-indigo-400 text-white' if ep == 'nueva_ronda' else 'bg-indigo-600 text-white' }}">
        <i class="bi bi-plus-lg"></i> Nueva ronda
      </a>
      <a href="https://docs.google.com/document/d/1uYGqfkzYCspucwf3HZQSmRgHaCZkfYv8CQwTBT4mBfU/edit?tab=t.0" target="_blank"
         class="flex items-center gap-2 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition">
        <i class="bi bi-file-earmark-text"></i> Docs
      </a>
    </div>
  </div>
</nav>

<!-- Logo modal -->
<div id="logo-modal" class="fixed inset-0 z-[200] hidden items-center justify-center">
  <div id="logo-backdrop" class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
  <div class="relative z-10 flex flex-col items-center gap-4">
    <img src="{{ url_for('static', filename='kuaza.png') }}?v={{ range(1000,9999) | random }}"
         alt="logo" class="w-64 h-64 rounded-3xl object-cover shadow-2xl ring-4 ring-indigo-400
                           scale-0 transition-transform duration-300 ease-out" id="logo-modal-img">
    <button id="logo-modal-close"
            class="text-white/70 hover:text-white text-sm flex items-center gap-1 transition">
      <i class="bi bi-x-circle"></i> Cerrar
    </button>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
<script>
  document.getElementById('menu-btn').addEventListener('click', function() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });

  const modal = document.getElementById('logo-modal');
  const modalImg = document.getElementById('logo-modal-img');

  function openLogoModal(e) {
    e.preventDefault();
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => modalImg.classList.replace('scale-0', 'scale-100'), 10);
  }

  function closeLogoModal() {
    modalImg.classList.replace('scale-100', 'scale-0');
    setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
  }

  document.getElementById('logo-img').addEventListener('click', openLogoModal);
  document.getElementById('logo-backdrop').addEventListener('click', closeLogoModal);
  document.getElementById('logo-modal-close').addEventListener('click', closeLogoModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLogoModal(); });
</script>
</body>
</html>
