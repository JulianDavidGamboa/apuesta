<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kuazimides{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5' }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none; }
    .profit-pos { color: #10b981; }
    .profit-neg { color: #f43f5e; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- Navbar -->
<nav class="bg-slate-900 shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="{{ url_for('index') }}" class="flex items-center gap-3">
        <img src="{{ url_for('static', filename='kuaza.png') }}" alt="logo"
             class="w-9 h-9 rounded-full object-cover ring-2 ring-indigo-400">
        <span class="text-white font-bold text-lg tracking-wide">Kuazimides</span>
      </a>

      <!-- Nav links -->
      <div class="hidden sm:flex items-center gap-2">
        <a href="{{ url_for('index') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-slate-700 transition">
          <i class="bi bi-clock-history"></i> Historial
        </a>
        <a href="{{ url_for('nueva_ronda') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm bg-indigo-600 text-white hover:bg-indigo-500 transition font-medium">
          <i class="bi bi-plus-lg"></i> Nueva ronda
        </a>
        <a href="{{ url_for('resumen') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-slate-700 transition">
          <i class="bi bi-bar-chart"></i> Resumen
        </a>
        <a href="{{ url_for('estadisticas') }}"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-slate-700 transition">
          <i class="bi bi-graph-up-arrow"></i> Estadísticas
        </a>
      </div>

      <!-- Mobile menu button -->
      <button id="menu-btn" class="sm:hidden text-slate-300 hover:text-white p-2">
        <i class="bi bi-list text-xl"></i>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden sm:hidden border-t border-slate-700">
    <div class="px-4 py-3 flex flex-col gap-1">
      <a href="{{ url_for('index') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition">
        <i class="bi bi-clock-history"></i> Historial
      </a>
      <a href="{{ url_for('nueva_ronda') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium">
        <i class="bi bi-plus-lg"></i> Nueva ronda
      </a>
      <a href="{{ url_for('resumen') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition">
        <i class="bi bi-bar-chart"></i> Resumen
      </a>
      <a href="{{ url_for('estadisticas') }}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white text-sm transition">
        <i class="bi bi-graph-up-arrow"></i> Estadísticas
      </a>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
<script>
  document.getElementById('menu-btn').addEventListener('click', function() {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });
</script>
</body>
</html>
